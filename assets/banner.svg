<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020b18"/>
      <stop offset="50%" style="stop-color:#040f22"/>
      <stop offset="100%" style="stop-color:#020b18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#4da6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#020b18;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#centerGlow)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="85" x2="1200" y2="85" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="170" x2="1200" y2="170" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.15"/>
  <line x1="0" y1="255" x2="1200" y2="255" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.15"/>

  <!-- Grid lines vertical -->
  <line x1="200" y1="0" x2="200" y2="340" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="340" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="340" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="340" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.1"/>
  <line x1="1000" y1="0" x2="1000" y2="340" stroke="#00d4ff" stroke-width="0.3" stroke-opacity="0.1"/>

  <!-- Stars -->
  <circle cx="45" cy="30" r="1" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="80" r="1.5" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="230" cy="25" r="1" fill="#00d4ff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="380" cy="55" r="0.8" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="520" cy="20" r="1.2" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="680" cy="45" r="1" fill="#4da6ff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="790" cy="15" r="0.8" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="920" cy="70" r="1.3" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="30" r="1" fill="#00d4ff" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="1150" cy="60" r="1.5" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.8s" repeatCount="indefinite"/></circle>
  <circle cx="70" cy="290" r="0.8" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.2s" repeatCount="indefinite"/></circle>
  <circle cx="160" cy="310" r="1.2" fill="#4da6ff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="1100" cy="295" r="1" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="1000" cy="320" r="0.8" fill="white" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
  <circle cx="860" cy="300" r="1.1" fill="#00d4ff" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/></circle>

  <!-- Left decorative circuit -->
  <g opacity="0.4" filter="url(#glow)">
    <polyline points="20,140 60,140 60,100 110,100" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="110" cy="100" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polyline points="20,180 50,180 50,220 100,220" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="100" cy="220" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="20" y1="160" x2="80" y2="160" stroke="#00d4ff" stroke-width="0.5"/>
    <circle cx="80" cy="160" r="2" fill="#00d4ff"/>
  </g>

  <!-- Right decorative circuit -->
  <g opacity="0.4" filter="url(#glow)">
    <polyline points="1180,140 1140,140 1140,100 1090,100" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1090" cy="100" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polyline points="1180,180 1150,180 1150,220 1100,220" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="1100" cy="220" r="3" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <line x1="1180" y1="160" x2="1120" y2="160" stroke="#00d4ff" stroke-width="0.5"/>
    <circle cx="1120" cy="160" r="2" fill="#00d4ff"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Bottom accent line -->
  <rect x="0" y="338" width="1200" height="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Mission ID top left -->
  <text x="30" y="22" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.6">MISSION-CTRL // SA-2024-001</text>
  <text x="30" y="34" font-family="'Courier New', monospace" font-size="8" fill="#4da6ff" opacity="0.4">STATUS: ACTIVE ● CLEARANCE: ENGINEER</text>

  <!-- Mission ID top right -->
  <text x="1170" y="22" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.6" text-anchor="end">COL // LATAM-SECTOR</text>
  <text x="1170" y="34" font-family="'Courier New', monospace" font-size="8" fill="#4da6ff" opacity="0.4" text-anchor="end">AI ● IoT ● AUTOMATION</text>

  <!-- Main Title -->
  <text x="600" y="148" font-family="'Courier New', monospace" font-size="54" font-weight="bold" fill="url(#titleGrad)" text-anchor="middle" filter="url(#softglow)" letter-spacing="4">SAMUEL ALARCÓN</text>

  <!-- Subtitle -->
  <text x="600" y="188" font-family="'Courier New', monospace" font-size="16" fill="#4da6ff" text-anchor="middle" letter-spacing="8" opacity="0.9">ELECTRONIC ENGINEER</text>

  <!-- Divider line -->
  <line x1="400" y1="204" x2="800" y2="204" stroke="url(#accent)" stroke-width="0.8" opacity="0.6"/>

  <!-- Slogan -->
  <text x="600" y="232" font-family="'Georgia', serif" font-size="15" fill="#aaccee" text-anchor="middle" font-style="italic" letter-spacing="2" opacity="0.85">Where Electronics Meets Artificial Intelligence</text>

  <!-- Tags -->
  <rect x="348" y="255" width="80" height="20" rx="2" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="388" y="269" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1">AI SYSTEMS</text>

  <rect x="440" y="255" width="80" height="20" rx="2" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="480" y="269" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1">AUTOMATION</text>

  <rect x="532" y="255" width="64" height="20" rx="2" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="564" y="269" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1">IoT</text>

  <rect x="608" y="255" width="80" height="20" rx="2" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="648" y="269" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1">EMBEDDED</text>

  <rect x="700" y="255" width="100" height="20" rx="2" fill="#00d4ff" fill-opacity="0.08" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="750" y="269" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" text-anchor="middle" letter-spacing="1">DEEP LEARNING</text>

  <rect x="812" y="255" width="40" height="20" rx="2" fill="#4da6ff" fill-opacity="0.12" stroke="#4da6ff" stroke-width="0.5" stroke-opacity="0.5"/>
  <text x="832" y="269" font-family="'Courier New', monospace" font-size="9" fill="#4da6ff" text-anchor="middle" letter-spacing="1">🇨🇴</text>

  <!-- Bottom status bar -->
  <rect x="0" y="310" width="1200" height="30" fill="#00d4ff" fill-opacity="0.04"/>
  <text x="30" y="329" font-family="'Courier New', monospace" font-size="8.5" fill="#00d4ff" opacity="0.5">▶ SYSTEMS ONLINE</text>
  <text x="180" y="329" font-family="'Courier New', monospace" font-size="8.5" fill="#4da6ff" opacity="0.4">|  PYTHON  |  LANGGRAPH  |  DOCKER  |  GCP  |  RASPBERRY Pi  |  PostgreSQL</text>
  <text x="1170" y="329" font-family="'Courier New', monospace" font-size="8.5" fill="#00d4ff" opacity="0.5" text-anchor="end">COLOMBIA ◉</text>
</svg>
